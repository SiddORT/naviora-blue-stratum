services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-naviora}
      POSTGRES_USER: ${POSTGRES_USER:-naviora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-naviora} -d ${POSTGRES_DB:-naviora}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - naviora_net

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-naviora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-naviora}
      SESSION_SECRET: ${SESSION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: production
      DEBUG: "false"
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - naviora_net

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8001
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - naviora_net

volumes:
  postgres_data:
  uploads_data:

networks:
  naviora_net:
    driver: bridge
